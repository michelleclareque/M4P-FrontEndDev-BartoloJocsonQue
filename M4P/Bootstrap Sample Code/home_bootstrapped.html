    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    
        <style>

        .table-dark-header {
            background-color: #343a40;
            color: white;
        }

        /* custom background setup for our group's brand page */
        .brand-bg-custom {
            background-color: #e9ecef;
            /* background-image: url('our-group-photo.jpg'); */
            /* background-size: cover; */
            /* background-position: center; */
            min-height: 100vh;
        }

        /* fixing the spacing for the wine category links on the left panel */
        .left-panel-links a {
            display: block;
            margin-bottom: 15px;
            text-decoration: none;
        }

        /* fixing the margin for the header since BS5 uses ms-3 instead of ml-3 */
        .ml-3 {
            margin-left: 1rem !important;
        }

        /* giving the login card a bit of a shadow and spacing to make it look cleaner */
        .card {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 40px; 
        }

        /* ensuring the footer has a white background so it blocks out text behind it */
        .fixed-bottom {
            background-color: white;
        }

        /* adding a little padding to the very bottom of the page so the fixed footer doesn't hide content */
        body {
            padding-bottom: 60px; 
        }
    </style>

</head>
