<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wines</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!-- insert style -->
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <div class="row">
        <div class="col pt-2">
            <h1 class="ml-3"> Wines For Sale</h1>
            <hr>    
        </div>

    <div class="container-fluid">
                    <div class="row">
                        <div class="col-2 justify-content-left">
                                <ul class="nav flex-column">
                                    <li class="nav-item">
                                        <a class="nav-link" href="#"> French Wines </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Italian Wines </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Spanish Wines </a>
                                    </li>
                                </ul>
                    
                        </div>
                        <div class="col-5 justify-content-center row border p-3"> <!--description box-->
                            <div class="row">
                                <div class="col-6">
                                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjH4ifm4MlJiulCYr0CnhARvMcrj7YmS5gZg&s" class="img-fluid">
                                <!--add custom logo?? idk-->
                                </div>
                                <div class="col-6">
                                    <h5>La Vieille Ferme</h5>
                                    <p>Since 1970, hehdkahhhsoehda</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-5 justify-content-center p-5"> <!--purchase box-->
                            <div class="col-12"> 
                                <h5>Purchase Details</h5>
                                <br>
                                <p><strong>La Vieille Ferme Rouge</strong></p>
                                <p>by: Famille Perrin</p> <!--hyperlink, remove space between the two lines-->
                            </div>
                            <div class="col-12">
                                <form method="POST" action="#">
                                    <div class="row">
                                        <div class="col-6">
                                            <label for="Vintage">Vintage</label>
                                            <select class="form-select" name="Vintage" id="Vintage">
                                                <option>2016</option>
                                                <option>2017</option>
                                                <option>2018</option>
                                            </select>
                                        </div>
                                        <div class="col-6">
                                            <label for="Quantity">Quantity</label>
                                            <input type="number" name="Quantity" id="Quantity" class="form-control">
                                        </div>
                                    </div>
                                    <div class="row mt-2">
                                        <div class="col-12">
                                            <button type="submit" class="btn btn-primary w-100">Submit</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-10 offset-2 p-3">
                            <form method="POST" action="#">
                                <label for="message">Send a Message:</label>
                                <textarea class="form-control" id="message" rows="3"></textarea>
                                <div class="d-flex justify-content-end p-3">
                                    <button type="submit" class="btn btn-primary">Submit</button>
                                </div>
                            </form>
                        </div>
                    </div>
    </div>
    <div class="justify-content-center fixed-bottom">
        <hr>
        <div class="col pb-3 text-center">
            @happywines
        </div>
    </div>
</body>
